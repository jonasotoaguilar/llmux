# openspec/config.yaml
# Project: llmux — Observable Multi-Provider LLM Gateway
# Generated by sdd-init. Edit rules per phase; keep context under 10 lines.

schema: spec-driven

context: |
  Project: llmux (self-hosted multi-provider LLM gateway with OpenAI-compatible API)
  Branch: ci/core-gateway-activation (base: feat/core-gateway-mvp)
  Stage: core gateway MVP activation — runtime + API merged, CI + ADRs activating
  Stack: Python 3.12, FastAPI, Pydantic v2, OpenTelemetry (api+sdk+otlp-http), uv
  Topology: modular monolith (hexagonal) + Next.js admin dashboard per ADR-0001
  Storage: PostgreSQL for usage/config/keys (per ADR-0002) — not in this slice
  Architecture docs: ARCHITECTURE.md, DESIGN.md, PRD.md, ROADMAP.md, docs/adr/*
  Testing tooling: pytest + pytest-cov + Ruff + mypy; strict_tdd now enabled
  Style: docs-first; ADRs captured under docs/adr/ as decisions are made

strict_tdd: true

testing:
  strict_tdd: true
  detected_runner: pytest
  detected_linter: ruff
  detected_type_checker: mypy
  detected_formatter: ruff
  coverage_available: true
  reason: "uv-managed backend on Python 3.12; pytest with pytest-cov enforces 90% coverage; Ruff for lint+format; mypy strict."

rules:
  proposal:
    - Include rollback plan for any change that introduces new infrastructure or persistence
    - Cite the relevant ADR (docs/adr/000N-*.md) when proposing architectural choices
    - Distinguish planned-vs-implemented: spec wording MUST NOT assume code that has not been written yet
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Mark requirements that depend on undocumented planned behavior with "(planned)" until implemented
  design:
    - Include sequence diagrams for any cross-module flow (routing, metering, failover)
    - Document architecture decisions with rationale AND trade-offs
    - Reuse existing ADR numbering (0003, 0004, ...) when capturing new decisions
  tasks:
    - Group by phase (setup, core, integration, polish)
    - Use hierarchical numbering (1.1, 1.2, ...)
    - Keep each task completable in one session and under the chained_pr_strategy budget (400 lines)
  apply:
    guidelines:
      - Follow existing patterns in docs/adr/ and root-level design docs
      - Do not introduce new dependencies without a design note
    tdd: true
    test_command: "uv run pytest -q --cov=llmux --cov-fail-under=90"
    build_command: "uv sync --frozen --all-groups"
  verify:
    test_command: "uv run pytest -q --cov=llmux --cov-fail-under=90"
    build_command: "uv run ruff check . && uv run mypy src tests"
    coverage_threshold: 90
  archive:
    - Warn before merging any delta marked (planned) that has not been implemented
    - Preserve ADR cross-references in archived change folders

artifact_store:
  mode: openspec
  engram_topic_keys:
    init_context: sdd-init/llmux
    testing_capabilities: sdd/llmux/testing-capabilities
    skill_registry: skill-registry

chained_pr:
  strategy: auto-forecast
  review_budget_lines: 400
