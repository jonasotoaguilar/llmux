name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-pr-size:
    name: Check PR Cognitive Load
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const limit = 400;
            const { additions, deletions, labels: prLabels } = context.payload.pull_request;
            const total = (additions || 0) + (deletions || 0);
            const hasException = (prLabels || []).some(l => l.name === 'size:exception');
            console.log(`PR size: +${additions}/-${deletions} = ${total} lines`);
            if (total <= limit) { console.log(`✅ Within ${limit}-line budget.`); return; }
            const msg = `PR changes ${total} lines, exceeding the ${limit}-line budget.`;
            if (hasException) { core.warning(`⚠️ ${msg}`); return; }
            core.setFailed(`❌ ${msg}`);

  check-issue-reference:
    name: Check Issue Reference
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const isMain = context.payload.pull_request.base.ref === (context.payload.repository.default_branch || 'main');
            const hasChain = /##\s*Chain\s*Context/i.test(body);
            const isChild = hasChain && !isMain;
            const mainRe = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const childRe = /(?:related to|refs?|linked issue)\s+#(\d+)/gi;
            const matches = isChild ? [...body.matchAll(mainRe), ...body.matchAll(childRe)] : [...body.matchAll(mainRe)];
            if (!matches.length) {
              core.setFailed(isChild
                ? '❌ Child PR body must reference a linked issue: Related to #N, Refs #N, or Linked issue #N'
                : '❌ PR body must reference a linked issue: Closes #N, Fixes #N, or Resolves #N');
            } else {
              console.log(`✅ Found issue reference(s): ${matches.map(m => `#${m[1]}`).join(', ')}`);
            }

  check-issue-approved:
    name: Check Issue Has status:approved
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check-issue-reference
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const all = [...body.matchAll(/(?:closes|fixes|resolves|related to|refs?|linked issue)\s+#(\d+)/gi)];
            if (!all.length) { core.setFailed('❌ No issue reference found.'); return; }
            const numbers = [...new Set(all.map(m => parseInt(m[1], 10)))];
            const failures = [];
            for (const n of numbers) {
              console.log(`Checking issue #${n}...`);
              try {
                const { data: issue } = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: n });
                const labels = issue.labels.map(l => l.name);
                if (!labels.includes('status:approved')) {
                  failures.push(`❌ Issue #${n} does not have "status:approved" label.`);
                } else {
                  console.log(`✅ Issue #${n} has status:approved.`);
                }
              } catch (e) {
                failures.push(`❌ Could not fetch issue #${n}: ${e.message}`);
              }
            }
            if (failures.length) core.setFailed(failures.join('\n'));

  check-type-label:
    name: Check PR Has type:* Label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.payload.pull_request.number });
            const typeLabels = pr.labels.filter(l => l.name.startsWith('type:'));
            console.log(`type:* labels: ${typeLabels.map(l => l.name).join(', ') || '(none)'}`);
            if (!typeLabels.length) core.setFailed('❌ PR must have exactly one type:* label (type:bug, type:feature, type:refactor, type:docs, type:chore, type:breaking-change).');
            else if (typeLabels.length > 1) core.setFailed(`❌ PR has ${typeLabels.length} type:* labels; must have exactly one.`);
            else console.log(`✅ PR has type label: ${typeLabels[0].name}`);
