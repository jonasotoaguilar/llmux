name: Feature Request
description: Propose a new capability or enhancement for LLMux
labels: ["enhancement", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## How this works

        1. **Submit** this feature request → it gets the `status:needs-review` label automatically
        2. A **maintainer reviews** it and adds `status:approved` (or closes it as out-of-scope/duplicate)
        3. **Only then** should you (or anyone) open a PR to implement it

        PRs that implement features without `status:approved` on the linked issue will be automatically rejected by CI.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I checked existing issues and this is not a duplicate
          required: true
        - label: I understand that PRs will be rejected if the linked issue does not have `status:approved`
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the project does this impact?
      options:
        - Backend / API (FastAPI)
        - Dashboard / Frontend (Next.js)
        - Provider Adapter
        - Database / Storage
        - Infrastructure / Docker
        - CI / Build
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Explain clearly.
      placeholder: |
        Currently we can't...
        The current flow fails when...
        To implement X today you have to manually do Y...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the expected solution. Be as specific as possible.
      placeholder: |
        Example:
        - New endpoint / expected behavior
        - Architecture or infrastructure changes needed
        - What the final result should look like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe alternative approaches, tradeoffs, or current workarounds.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any additional context, examples, references, or relevant architecture decisions.
    validations:
      required: false
